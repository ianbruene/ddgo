name: cd

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            arch: amd64
            lipo_arch: x86_64
          - os: macos-14
            arch: arm64
            lipo_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Diagnose macOS runner
        run: |
          set -euo pipefail
          echo "RUNNER_OS=$RUNNER_OS"
          echo "RUNNER_ARCH=$RUNNER_ARCH"
          echo "ImageOS=${ImageOS:-}"
          sw_vers
          uname -a
          uname -m
          xcode-select -p
          clang --version
          brew --version
      - name: Install macOS dependencies
        run: |
          set -euo pipefail
          brew install qt@5 pkg-config
          brew --prefix qt@5
          ls -la "$(brew --prefix qt@5)/bin" | sed -n '1,40p'
      - name: Build macOS binary
        run: |
          set -euo pipefail
          echo "Building for GOARCH=${{ matrix.arch }} on runner arch $(uname -m)"
          go env
          mkdir -p dist
          export PATH="$(brew --prefix qt@5)/bin:$PATH"
          export PKG_CONFIG_PATH="$(brew --prefix qt@5)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          export MACOSX_DEPLOYMENT_TARGET=14.0
          GOOS=darwin GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build -tags "miqt serial" -trimpath -ldflags="-s -w" -o dist/ddgo-darwin-${{ matrix.arch }} ./cmd/ddgo
      - name: Package macOS DMG
        run: |
          set -euo pipefail
          bash scripts/package-macos.sh ${{ matrix.arch }} dist/ddgo-darwin-${{ matrix.arch }} dist/DDGo-macos-${{ matrix.arch }}.dmg ${{ github.ref_name }}
          ls -lah dist
      - name: Verify macOS app bundle
        run: bash scripts/verify-macos-app.sh dist/DDGo.app ${{ matrix.lipo_arch }} 14.0
      - uses: actions/upload-artifact@v4
        with:
          name: DDGo-macos-${{ matrix.arch }}
          path: dist/DDGo-macos-${{ matrix.arch }}.dmg

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-go
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-pkgconf
            zip
          msystem: MINGW64
          path-type: inherit
      - shell: msys2 {0}
        run: |
          set -euo pipefail
          mkdir -p dist
          export PATH="${MINGW_PREFIX}/bin:/usr/bin:${PATH}"
          export CC=gcc
          go version
          gcc --version
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 go build -tags "miqt serial" -trimpath -ldflags="-s -w -H windowsgui" -o dist/ddgo-windows-amd64.exe ./cmd/ddgo
          bash scripts/package-windows-msys2.sh dist/ddgo-windows-amd64.exe "$(pwd)/dist/DDGo-windows-amd64.zip"
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\check | Out-Null
          Expand-Archive -Path dist\DDGo-windows-amd64.zip -DestinationPath dist\check -Force
          .\scripts\verify-windows-dist.ps1 -DistDir dist\check\DDGo
      - uses: actions/upload-artifact@v4
        with:
          name: DDGo-windows-amd64
          path: dist/DDGo-windows-amd64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DDGo-macos-amd64/DDGo-macos-amd64.dmg
            dist/DDGo-macos-arm64/DDGo-macos-arm64.dmg
            dist/DDGo-windows-amd64/DDGo-windows-amd64.zip
