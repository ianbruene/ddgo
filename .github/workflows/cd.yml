name: cd

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-artifacts:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            ext: ""
          - os: macos-latest
            goos: darwin
            ext: ""
          - os: windows-latest
            goos: windows
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build release binary
        shell: bash
        run: |
          mkdir -p dist
          output="dist/cncui-${{ matrix.goos }}-amd64${{ matrix.ext }}"
          GOOS="${{ matrix.goos }}" GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o "$output" ./cmd/cncui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cncui-${{ matrix.goos }}-amd64
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-artifacts
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
