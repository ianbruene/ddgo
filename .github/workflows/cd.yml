name: cd

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos-slice:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: arm64
            lipo_arch: arm64
            slice: arm64
            macos_min: "15.0"

          - os: macos-15-intel
            arch: amd64
            lipo_arch: x86_64
            slice: amd64
            macos_min: "15.0"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Diagnose macOS runner
        run: |
          set -euo pipefail
          echo "RUNNER_OS=$RUNNER_OS"
          echo "RUNNER_ARCH=$RUNNER_ARCH"
          echo "ImageOS=${ImageOS:-}"
          sw_vers
          uname -a
          uname -m
          xcode-select -p
          clang --version
          brew --version
      - name: Install macOS dependencies
        run: |
          set -euo pipefail
          brew install qt@5 pkg-config
      - name: Build and package macOS app slice
        run: |
          set -euo pipefail
          mkdir -p dist
          export MACOSX_DEPLOYMENT_TARGET="${{ matrix.macos_min }}"
          export PATH="$(brew --prefix qt@5)/bin:$PATH"
          export PKG_CONFIG_PATH="$(brew --prefix qt@5)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"

          GOOS=darwin GOARCH=${{ matrix.arch }} CGO_ENABLED=1 \
            go build -tags "miqt serial" -trimpath -ldflags="-s -w" \
            -o dist/ddgo-darwin-${{ matrix.slice }} \
            ./cmd/ddgo

          bash scripts/package-macos.sh \
            ${{ matrix.arch }} \
            dist/ddgo-darwin-${{ matrix.slice }} \
            dist/tmp-${{ matrix.slice }}.dmg \
            ${{ github.ref_name }}

          rm -rf dist/macos-${{ matrix.slice }}
          mkdir -p dist/macos-${{ matrix.slice }}
          ditto dist/DDGo.app dist/macos-${{ matrix.slice }}/DDGo.app
      - name: Verify macOS app slice
        run: bash scripts/verify-macos-app.sh dist/macos-${{ matrix.slice }}/DDGo.app ${{ matrix.lipo_arch }} 15.0
      - name: Archive macOS app slice
        run: |
          set -euo pipefail
          mkdir -p dist/app-artifacts
          tar -C dist/macos-${{ matrix.slice }} -czf dist/app-artifacts/DDGo-app-${{ matrix.slice }}.tar.gz DDGo.app
          ls -lh dist/app-artifacts/DDGo-app-${{ matrix.slice }}.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: DDGo-app-${{ matrix.slice }}
          path: dist/app-artifacts/DDGo-app-${{ matrix.slice }}.tar.gz

  build-macos-universal:
    needs: [build-macos-slice]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: DDGo-app-arm64
          path: slices/DDGo-app-arm64
      - uses: actions/download-artifact@v4
        with:
          name: DDGo-app-amd64
          path: slices/DDGo-app-amd64
      - name: Extract macOS app slices
        run: |
          set -euo pipefail

          echo "Downloaded artifact layout:"
          find slices -maxdepth 5 -print | sort

          mkdir -p slices/extracted/arm64 slices/extracted/amd64

          tar -xzf slices/DDGo-app-arm64/DDGo-app-arm64.tar.gz -C slices/extracted/arm64
          tar -xzf slices/DDGo-app-amd64/DDGo-app-amd64.tar.gz -C slices/extracted/amd64

          test -d slices/extracted/arm64/DDGo.app
          test -d slices/extracted/amd64/DDGo.app

          echo "Extracted app layout:"
          find slices/extracted -maxdepth 5 -print | sort | sed -n '1,200p'
      - name: Merge universal macOS app
        run: |
          set -euo pipefail
          bash scripts/merge-macos-universal.sh \
            slices/extracted/arm64/DDGo.app \
            slices/extracted/amd64/DDGo.app \
            dist/macos-universal/DDGo.app
      - name: Verify universal macOS app
        run: bash scripts/verify-macos-universal-app.sh dist/macos-universal/DDGo.app 15.0
      - name: Create universal macOS DMG
        run: bash scripts/create-macos-dmg.sh dist/macos-universal/DDGo.app dist/DDGo-macos-universal.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: DDGo-macos-universal
          path: dist/DDGo-macos-universal.dmg

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-go
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-pkgconf
            zip
          msystem: MINGW64
          path-type: inherit
      - shell: msys2 {0}
        run: |
          set -euo pipefail
          mkdir -p dist
          export PATH="${MINGW_PREFIX}/bin:/usr/bin:${PATH}"
          export CC=gcc
          go version
          gcc --version
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 go build -tags "miqt serial" -trimpath -ldflags="-s -w -H windowsgui" -o dist/ddgo-windows-amd64.exe ./cmd/ddgo
          bash scripts/package-windows-msys2.sh dist/ddgo-windows-amd64.exe "$(pwd)/dist/DDGo-windows-amd64.zip"
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\check | Out-Null
          Expand-Archive -Path dist\DDGo-windows-amd64.zip -DestinationPath dist\check -Force
          .\scripts\verify-windows-dist.ps1 -DistDir dist\check\DDGo
      - uses: actions/upload-artifact@v4
        with:
          name: DDGo-windows-amd64
          path: dist/DDGo-windows-amd64.zip

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') && always() }}
    needs: [build-macos-universal, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          if-no-artifact-found: ignore
      - name: Ensure at least one release artifact exists
        run: |
          shopt -s nullglob
          files=(dist/*/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts were found."
            exit 1
          fi
      - uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          body: |
            ### macOS

            `DDGo-macos-universal.dmg` is a universal macOS 15+ build containing both Apple Silicon (`arm64`) and Intel (`x86_64`) slices.

            macOS 14 and earlier are no longer supported.

            ### Windows

            `DDGo-windows-amd64.zip` contains the Windows executable and required Qt/MinGW runtime files. Extract the whole folder before running `DDGo.exe`.
          files: |
            dist/DDGo-macos-universal/DDGo-macos-universal.dmg
            dist/DDGo-windows-amd64/DDGo-windows-amd64.zip
