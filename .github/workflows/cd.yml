name: cd

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: amd64
            lipo_arch: x86_64
          - os: macos-14-arm64
            arch: arm64
            lipo_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: brew install qt@5 pkg-config
      - run: |
          mkdir -p dist
          export PATH="$(brew --prefix qt@5)/bin:$PATH"
          export PKG_CONFIG_PATH="$(brew --prefix qt@5)/lib/pkgconfig:$PKG_CONFIG_PATH"
          GOOS=darwin GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build -tags "miqt serial" -trimpath -ldflags="-s -w" -o dist/ddgo-darwin-${{ matrix.arch }} ./cmd/ddgo
      - run: scripts/package-macos.sh ${{ matrix.arch }} dist/ddgo-darwin-${{ matrix.arch }} dist/DDGo-macos-${{ matrix.arch }}.dmg ${{ github.ref_name }}
      - run: scripts/verify-macos-app.sh dist/DDGo.app ${{ matrix.lipo_arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: DDGo-macos-${{ matrix.arch }}
          path: dist/DDGo-macos-${{ matrix.arch }}.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-pkgconf
            zip
          msystem: MINGW64
          path-type: inherit
      - shell: msys2 {0}
        run: |
          mkdir -p dist
          export CC=gcc
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 go build -tags "miqt serial" -trimpath -ldflags="-s -w" -o dist/ddgo-windows-amd64.exe ./cmd/ddgo
          scripts/package-windows-msys2.sh dist/ddgo-windows-amd64.exe "$(pwd)/dist/DDGo-windows-amd64.zip"
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\check | Out-Null
          Expand-Archive -Path dist\DDGo-windows-amd64.zip -DestinationPath dist\check -Force
          .\scripts\verify-windows-dist.ps1 -DistDir dist\check
      - uses: actions/upload-artifact@v4
        with:
          name: DDGo-windows-amd64
          path: dist/DDGo-windows-amd64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DDGo-macos-amd64/DDGo-macos-amd64.dmg
            dist/DDGo-macos-arm64/DDGo-macos-arm64.dmg
            dist/DDGo-windows-amd64/DDGo-windows-amd64.zip
