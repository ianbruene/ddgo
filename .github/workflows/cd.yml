name: cd

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-artifacts:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            ext: ""
          - os: macos-latest
            goos: darwin
            ext: ""
          - os: windows-latest
            goos: windows
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        if: matrix.goos != 'windows'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config qtbase5-dev

      - name: Install macOS build dependencies
        if: matrix.goos == 'darwin'
        run: |
          brew update
          brew install qt@5 pkg-config

      - name: Set up MSYS2 (Windows Qt + MinGW toolchain)
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-qt5
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-go
          msystem: MINGW64

      - name: Build release binary (Linux/macOS)
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          mkdir -p dist
          output="dist/cncui-${{ matrix.goos }}-amd64${{ matrix.ext }}"
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            export PKG_CONFIG_PATH="$(brew --prefix qt@5)/lib/pkgconfig:${PKG_CONFIG_PATH}"
          fi

          GOOS="${{ matrix.goos }}" GOARCH=amd64 CGO_ENABLED=1 go build -tags "miqt serial" -trimpath -ldflags='-s -w' -o "$output" ./cmd/cncui

      - name: Build release binary (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          mkdir -p dist
          output="dist/cncui-${{ matrix.goos }}-amd64${{ matrix.ext }}"
          export PATH="/c/msys64/mingw64/bin:/c/msys64/usr/bin:$PATH"
          export CC=x86_64-w64-mingw32-gcc
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 go build -tags "miqt serial" -trimpath -ldflags='-s -w' -o "$output" ./cmd/cncui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cncui-${{ matrix.goos }}-amd64
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-artifacts
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
