name: cd

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos-slice:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: arm64
            lipo_arch: arm64
            slice: arm64
            macos_min: "15.0"

          - os: macos-15-intel
            arch: amd64
            lipo_arch: x86_64
            slice: amd64
            macos_min: "15.0"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Diagnose macOS runner
        run: |
          set -euo pipefail
          echo "RUNNER_OS=$RUNNER_OS"
          echo "RUNNER_ARCH=$RUNNER_ARCH"
          echo "ImageOS=${ImageOS:-}"
          sw_vers
          uname -a
          uname -m
          xcode-select -p
          clang --version
          brew --version
      - name: Install macOS dependencies
        run: |
          set -euo pipefail
          brew install qt@5 pkg-config
      - name: Configure macOS build environment
        run: |
          set -euxo pipefail
          export MACOSX_DEPLOYMENT_TARGET="${{ matrix.macos_min }}"
          qt_prefix="$(brew --prefix qt@5)"
          export PATH="${qt_prefix}/bin:$PATH"
          export PKG_CONFIG_PATH="${qt_prefix}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          export CGO_CFLAGS="-I${qt_prefix}/include ${CGO_CFLAGS:-}"
          export CGO_CXXFLAGS="-I${qt_prefix}/include ${CGO_CXXFLAGS:-}"
          export CGO_LDFLAGS="-F${qt_prefix}/lib -L${qt_prefix}/lib ${CGO_LDFLAGS:-}"

          echo "RUNNER_OS=$RUNNER_OS"
          echo "RUNNER_ARCH=$RUNNER_ARCH"
          uname -m
          sw_vers
          go version
          clang --version
          brew --prefix
          brew --prefix qt@5
          echo "CGO_CFLAGS=$CGO_CFLAGS"
          echo "CGO_CXXFLAGS=$CGO_CXXFLAGS"
          echo "CGO_LDFLAGS=$CGO_LDFLAGS"
          pkg-config --modversion Qt5Core
          pkg-config --modversion Qt5Widgets
          qmake -query || true
          qt_plugins_dir="$(qmake -query QT_INSTALL_PLUGINS || echo "$qt_prefix/plugins")"
          ls -la "$qt_plugins_dir/platforms" || true
      - name: Build macOS app binary
        run: |
          set -euxo pipefail
          mkdir -p dist
          export MACOSX_DEPLOYMENT_TARGET="${{ matrix.macos_min }}"
          qt_prefix="$(brew --prefix qt@5)"
          export PATH="${qt_prefix}/bin:$PATH"
          export PKG_CONFIG_PATH="${qt_prefix}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          export CGO_CFLAGS="-I${qt_prefix}/include ${CGO_CFLAGS:-}"
          export CGO_CXXFLAGS="-I${qt_prefix}/include ${CGO_CXXFLAGS:-}"
          export CGO_LDFLAGS="-F${qt_prefix}/lib -L${qt_prefix}/lib ${CGO_LDFLAGS:-}"

          go clean -cache
          GOOS=darwin GOARCH=${{ matrix.arch }} CGO_ENABLED=1 \
            go build -x -tags "miqt serial" -trimpath -ldflags="-s -w" \
            -o dist/ddgo-darwin-${{ matrix.slice }} \
            ./cmd/ddgo
      - name: Inspect macOS app binary
        run: |
          set -euxo pipefail
          export MACOSX_DEPLOYMENT_TARGET="${{ matrix.macos_min }}"
          export PATH="$(brew --prefix qt@5)/bin:$PATH"
          export PKG_CONFIG_PATH="$(brew --prefix qt@5)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"

          file dist/ddgo-darwin-${{ matrix.slice }}
          lipo -archs dist/ddgo-darwin-${{ matrix.slice }}
          otool -L dist/ddgo-darwin-${{ matrix.slice }}
      - name: Package macOS app slice
        run: |
          set -euxo pipefail
          export MACOSX_DEPLOYMENT_TARGET="${{ matrix.macos_min }}"
          export PATH="$(brew --prefix qt@5)/bin:$PATH"
          export PKG_CONFIG_PATH="$(brew --prefix qt@5)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"

          rm -rf dist/macos-${{ matrix.slice }}
          mkdir -p dist/macos-${{ matrix.slice }}

          bash scripts/package-macos-app.sh \
            ${{ matrix.arch }} \
            dist/ddgo-darwin-${{ matrix.slice }} \
            dist/macos-${{ matrix.slice }}/DDGo.app \
            ${{ github.ref_name }}
      - name: Verify macOS app slice
        run: |
          set -euo pipefail
          export MACOSX_DEPLOYMENT_TARGET="${{ matrix.macos_min }}"
          export PATH="$(brew --prefix qt@5)/bin:$PATH"
          export PKG_CONFIG_PATH="$(brew --prefix qt@5)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"

          bash scripts/verify-macos-app.sh dist/macos-${{ matrix.slice }}/DDGo.app ${{ matrix.lipo_arch }} 15.0
      - name: Archive macOS app slice
        run: |
          set -euo pipefail
          mkdir -p dist/app-artifacts
          tar -C dist/macos-${{ matrix.slice }} -czf dist/app-artifacts/DDGo-app-${{ matrix.slice }}.tar.gz DDGo.app
          ls -lh dist/app-artifacts/DDGo-app-${{ matrix.slice }}.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: DDGo-app-${{ matrix.slice }}
          path: dist/app-artifacts/DDGo-app-${{ matrix.slice }}.tar.gz

  build-macos-universal:
    needs: [build-macos-slice]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: DDGo-app-arm64
          path: slices/DDGo-app-arm64
      - uses: actions/download-artifact@v4
        with:
          name: DDGo-app-amd64
          path: slices/DDGo-app-amd64
      - name: Extract macOS app slices
        run: |
          set -euo pipefail

          echo "Downloaded artifact layout:"
          find slices -maxdepth 5 -print | sort

          mkdir -p slices/extracted/arm64 slices/extracted/amd64

          tar -xzf slices/DDGo-app-arm64/DDGo-app-arm64.tar.gz -C slices/extracted/arm64
          tar -xzf slices/DDGo-app-amd64/DDGo-app-amd64.tar.gz -C slices/extracted/amd64

          test -d slices/extracted/arm64/DDGo.app
          test -d slices/extracted/amd64/DDGo.app

          echo "Extracted app layout:"
          find slices/extracted -maxdepth 5 -print | sort | sed -n '1,200p'
      - name: Merge universal macOS app
        run: |
          set -euo pipefail
          bash scripts/merge-macos-universal.sh \
            slices/extracted/arm64/DDGo.app \
            slices/extracted/amd64/DDGo.app \
            dist/macos-universal/DDGo.app
      - name: Verify universal macOS app
        run: bash scripts/verify-macos-universal-app.sh dist/macos-universal/DDGo.app 15.0
      - name: Create universal macOS DMG
        run: bash scripts/create-macos-dmg.sh dist/macos-universal/DDGo.app dist/DDGo-macos-universal.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: DDGo-macos-universal
          path: dist/DDGo-macos-universal.dmg

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-go
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-pkgconf
            zip
          msystem: MINGW64
          path-type: inherit
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y
      - name: Build and stage Windows app
        shell: msys2 {0}
        run: |
          set -euo pipefail
          mkdir -p dist
          export PATH="${MINGW_PREFIX}/bin:/usr/bin:${PATH}"
          export CC=gcc

          go version
          gcc --version

          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 \
            go build -tags "miqt serial" -trimpath -ldflags="-s -w -H windowsgui" \
            -o dist/ddgo-windows-amd64.exe \
            ./cmd/ddgo

          bash scripts/stage-windows-msys2.sh \
            dist/ddgo-windows-amd64.exe \
            dist/windows/DDGo

          (
            cd dist/windows
            rm -f ../DDGo-windows-amd64.zip
            zip -r ../DDGo-windows-amd64.zip DDGo
          )
      - name: Verify Windows staged folder and ZIP
        shell: pwsh
        run: |
          .\scripts\verify-windows-dist.ps1 -DistDir dist\windows\DDGo

          New-Item -ItemType Directory -Path dist\check | Out-Null
          Expand-Archive -Path dist\DDGo-windows-amd64.zip -DestinationPath dist\check -Force
          .\scripts\verify-windows-dist.ps1 -DistDir dist\check\DDGo
      - name: Build Windows installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "iscc"
          }

          $version = "${{ github.ref_name }}"
          if ($version -eq "master" -or [string]::IsNullOrWhiteSpace($version)) {
            $version = "0.0.0"
          }
          $version = $version.TrimStart("v")

          & $iscc `
            /DMyAppVersion="$version" `
            /DSourceDir="$pwd\dist\windows\DDGo" `
            /DOutputDir="$pwd\dist" `
            installer\windows\DDGo.iss

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          Test-Path dist\DDGo-windows-amd64-setup.exe
      - name: Verify Windows installer
        shell: pwsh
        run: |
          $installDir = Join-Path $pwd "dist\installed"
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null

          Start-Process `
            -FilePath "dist\DDGo-windows-amd64-setup.exe" `
            -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/DIR=$installDir" `
            -Wait `
            -NoNewWindow

          .\scripts\verify-windows-dist.ps1 -DistDir $installDir

          $uninstaller = Join-Path $installDir "unins000.exe"
          if (-not (Test-Path $uninstaller)) {
            Write-Error "Expected Inno uninstaller missing: $uninstaller"
            exit 1
          }
      - uses: actions/upload-artifact@v4
        with:
          name: DDGo-windows-amd64
          path: |
            dist/DDGo-windows-amd64.zip
            dist/DDGo-windows-amd64-setup.exe

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: [build-macos-universal, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          if-no-artifact-found: ignore
      - name: Validate required release artifacts
        run: |
          set -euo pipefail

          echo "Downloaded release artifact layout:"
          find dist -maxdepth 4 -type f -print | sort

          required=(
            "dist/DDGo-macos-universal/DDGo-macos-universal.dmg"
            "dist/DDGo-windows-amd64/DDGo-windows-amd64.zip"
            "dist/DDGo-windows-amd64/DDGo-windows-amd64-setup.exe"
          )

          for path in "${required[@]}"; do
            if [[ ! -f "$path" ]]; then
              echo "Missing required release artifact: $path" >&2
              exit 1
            fi
          done
      - uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          body: |
            ### macOS

            `DDGo-macos-universal.dmg` is a universal macOS 15+ build containing both Apple Silicon (`arm64`) and Intel (`x86_64`) slices.

            macOS 14 and earlier are no longer supported.

            ### Windows

            `DDGo-windows-amd64-setup.exe` is the recommended Windows installer.

            `DDGo-windows-amd64.zip` is also provided as a portable/debug package. If using the ZIP, extract the whole `DDGo` folder before running `DDGo.exe`.
          files: |
            dist/DDGo-macos-universal/DDGo-macos-universal.dmg
            dist/DDGo-windows-amd64/DDGo-windows-amd64.zip
            dist/DDGo-windows-amd64/DDGo-windows-amd64-setup.exe
