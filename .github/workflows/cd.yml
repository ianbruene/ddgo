name: cd

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-artifacts:
    timeout-minutes: 90
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Capture Go cache paths
        id: go-cache-paths
        shell: bash
        run: |
          echo "gomodcache=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
          echo "gocache=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"

      - name: Restore Go build caches
        id: go-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ steps.go-cache-paths.outputs.gomodcache }}
            ${{ steps.go-cache-paths.outputs.gocache }}
          key: cd-go-${{ runner.os }}-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('go.sum') }}-${{ github.run_id }}
          restore-keys: |
            cd-go-${{ runner.os }}-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('go.sum') }}-
            cd-go-${{ runner.os }}-${{ matrix.goos }}-${{ matrix.goarch }}-

      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config qtbase5-dev

      - name: Install macOS build dependencies
        if: matrix.goos == 'darwin'
        run: |
          brew update
          brew install qt@5 pkg-config

      - name: Set up MSYS2 (Windows Qt + MinGW toolchain)
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-pkgconf
          msystem: MINGW64
          path-type: inherit

      - name: macOS diagnostics
        if: matrix.goos == 'darwin'
        shell: bash
        run: |
          uname -a
          uname -m
          go env GOOS GOARCH CGO_ENABLED
          brew --prefix qt@5
          file "$(brew --prefix qt@5)/lib/libQt5Core.dylib" || true
          pkg-config --modversion Qt5Core || true

      - name: Download Go dependencies
        timeout-minutes: 15
        shell: bash
        run: |
          go env -w GOPROXY=https://proxy.golang.org,direct
          go mod download -x

      - name: Build release binary (Linux/macOS)
        if: matrix.goos != 'windows'
        timeout-minutes: 20
        shell: bash
        run: |
          mkdir -p dist
          output="dist/cncui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"

          if [ "${{ matrix.goos }}" = "darwin" ]; then
            export PATH="$(brew --prefix qt@5)/bin:$PATH"
            export PKG_CONFIG_PATH="$(brew --prefix qt@5)/lib/pkgconfig:$PKG_CONFIG_PATH"
          fi

          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=1 go build -v -tags "miqt serial" -trimpath -ldflags="-s -w" -o "$output" ./cmd/cncui

      - name: Build release binary (Windows)
        if: matrix.goos == 'windows'
        timeout-minutes: 60
        shell: msys2 {0}
        run: |
          mkdir -p dist
          output="dist/cncui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          echo "PATH=$PATH"
          echo "go binary: $(command -v go || true)"
          echo "go version: $(go version)"
          echo "gcc version: $(gcc --version | head -n1)"
          echo "pkg-config Qt5Core: $(pkg-config --modversion Qt5Core)"
          export CC=gcc
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=1 go build -v -tags "miqt serial" -trimpath -ldflags="-s -w" -o "$output" ./cmd/cncui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cncui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/cncui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

      - name: Save Go build caches
        if: success() && steps.go-cache-restore.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ steps.go-cache-paths.outputs.gomodcache }}
            ${{ steps.go-cache-paths.outputs.gocache }}
          key: ${{ steps.go-cache-restore.outputs.cache-primary-key }}


  build-macos-universal:
    needs: build-artifacts
    runs-on: macos-latest

    steps:
      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: cncui-darwin-amd64
          path: dist

      - name: Download macOS Apple Silicon artifact
        uses: actions/download-artifact@v4
        with:
          name: cncui-darwin-arm64
          path: dist

      - name: Merge macOS binaries into universal artifact
        shell: bash
        run: |
          mkdir -p dist
          lipo -create -output dist/cncui-darwin-universal \
            dist/cncui-darwin-amd64 \
            dist/cncui-darwin-arm64

      - name: Verify universal binary
        shell: bash
        run: |
          lipo -archs dist/cncui-darwin-universal
          file dist/cncui-darwin-universal

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: cncui-darwin-universal
          path: dist/cncui-darwin-universal

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-artifacts
      - build-macos-universal
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
